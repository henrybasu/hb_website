name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Vernan assets (monorepo)
        run: |
          if [ -f ../scripts/sync-vernan-assets.sh ] && [ -d ../new-vernan-2/sprites ]; then
            chmod +x ../scripts/sync-vernan-assets.sh
            (cd .. && ./scripts/sync-vernan-assets.sh)
          else
            echo "Using committed assets/vernan (standalone hb_website repo or assets already present)."
          fi

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
